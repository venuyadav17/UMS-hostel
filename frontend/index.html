<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Booking - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <div class="container">
        <h1><i class="fas fa-hotel"></i> HostelHub</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Welcome back! Please login to your account.</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Login <i class="fas fa-sign-in-alt"></i></button>
        </form>
        <a href="/register.html" class="link">Don't have an account? Register</a>
    </div>
    <script src="static/script.js"></script>
</body>

</html>
