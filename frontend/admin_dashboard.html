<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - HostelHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <nav class="nav">
        <h2><i class="fas fa-hotel"></i> HostelHub</h2>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <span><i class="fas fa-user-shield"></i> Admin Portal</span>
            <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <h2 style="margin-bottom: 2rem;"><i class="fas fa-tasks"></i> Management Overview</h2>

        <div class="admin-grid">
            <!-- Add Hostel Form -->
            <div class="glass" style="padding: 2.5rem;">
                <h3><i class="fas fa-plus-circle"></i> Add New Hostel</h3>
                <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Register a new building in the system.</p>
                <form id="addHostelForm">
                    <div class="form-group">
                        <label for="hostelName">Hostel Name</label>
                        <input type="text" id="hostelName" placeholder="e.g. Royal Residency" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" rows="3" placeholder="Describe facilities..."></textarea>
                    </div>
                    <button type="submit">Publish Hostel <i class="fas fa-upload"></i></button>
                </form>
            </div>

            <!-- Add Room Form -->
            <div class="glass" style="padding: 2.5rem;">
                <h3><i class="fas fa-bed"></i> Add Rooms to Hostel</h3>
                <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Configure room specs and pricing.</p>
                <form id="addRoomForm">
                    <div class="form-group">
                        <label for="hostelSelect">Target Hostel</label>
                        <select id="hostelSelect" required>
                            <option value="">Select a hostel...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="numRooms">Number of Rooms</label>
                        <input type="number" id="numRooms" placeholder="How many rooms?" min="1" required>
                    </div>
                    <div id="roomNumbersContainer"
                        style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-bottom: 1rem;">
                        <!-- Dynamic room number inputs will appear here -->
                    </div>
                    <div class="admin-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; min-width: 0;">
                        <div class="form-group">
                            <label for="roomType">Type</label>
                            <select id="roomType" required>
                                <option value="ac">AC</option>
                                <option value="non_ac">Non-AC</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="capacity">Seater</label>
                            <select id="capacity" required>
                                <option value="3">3 Seater</option>
                                <option value="4">4 Seater</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="price">Price (per year)</label>
                        <div style="position: relative;">
                            <span
                                style="position: absolute; left: 1rem; top: 0.875rem; color: var(--text-muted);">$</span>
                            <input type="number" id="price" style="padding-left: 2rem;" placeholder="0.00" required>
                        </div>
                    </div>
                    <button type="submit">Add Rooms <i class="fas fa-plus"></i></button>
                </form>
            </div>

            <!-- Add Admin Form -->
            <div class="glass" style="padding: 2.5rem;">
                <h3><i class="fas fa-user-shield"></i> Add New Admin</h3>
                <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Register another admin user.</p>
                <form id="addAdminForm">
                    <div class="form-group">
                        <label for="adminUsername">Username</label>
                        <input type="text" id="adminUsername" placeholder="Admin username" required>
                    </div>
                    <div class="form-group">
                        <label for="adminEmail">Email</label>
                        <input type="email" id="adminEmail" placeholder="admin@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="adminPassword">Password</label>
                        <input type="password" id="adminPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit">Create Admin Account <i class="fas fa-user-plus"></i></button>
                </form>
            </div>
        </div>
    </div>

    <script src="static/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadHostelsForSelect);
    </script>
</body>

</html>
