<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Booking - Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <div class="container">
        <h1><i class="fas fa-user-plus"></i> Join HostelHub</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Create an account to start booking.</p>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="role">Register As</label>
                <select id="role" required>
                    <option value="student">Student</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit">Create Account <i class="fas fa-check-circle"></i></button>
        </form>
        <a href="/login" class="link">Already have an account? Login</a>
    </div>
    <script src="static/script.js"></script>
</body>

</html>
